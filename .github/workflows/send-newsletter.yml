name: Send Newsletter

on:
  schedule:
    - cron: '0 23 * * 1'  # 화요일 08:00 KST (월요일 23:00 UTC)
    - cron: '0 23 * * 3'  # 목요일 08:00 KST (수요일 23:00 UTC)
    - cron: '0 23 * * 5'  # 토요일 08:00 KST (금요일 23:00 UTC)
  workflow_dispatch:      # 수동 트리거

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build web
        run: npm run build

      - name: Deploy web to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler pages deploy web/dist --project-name runeorrri

      - name: Send newsletter to all subscribers
        working-directory: scripts
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_FROM_NAME: runeorrri
          RUNEORRRI_SITE_BASE_URL: ${{ secrets.RUNEORRRI_SITE_BASE_URL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python send_issue_email.py
