name: Send Newsletter

on:
  schedule:
    # 2026-05-19 08:00 KST. GitHub cron uses UTC.
    - cron: '0 23 18 5 *'
  workflow_dispatch:
    inputs:
      confirm_subscriber_send:
        description: 'Type true only after editorial approval to send to all active subscribers.'
        required: true
        type: boolean
        default: false
      issue_id:
        description: 'Issue id to send.'
        required: true
        type: string
        default: latest

jobs:
  send:
    if: ${{ github.event_name == 'schedule' || inputs.confirm_subscriber_send == true }}
    runs-on: ubuntu-latest
    env:
      ISSUE_ID: ${{ github.event_name == 'schedule' && '2026-05-19-11' || inputs.issue_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Guard one-time scheduled send
        if: ${{ github.event_name == 'schedule' }}
        run: |
          if [ "$(date -u +%F)" != "2026-05-18" ]; then
            echo "Skipping stale one-time schedule."
            exit 1
          fi

      - name: Send newsletter to all subscribers
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_FROM_NAME: runeorrri
          RUNEORRRI_SITE_BASE_URL: ${{ secrets.RUNEORRRI_SITE_BASE_URL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/send_issue_email.py --recipients subscribers --confirm-subscriber-send --issue-id "$ISSUE_ID"

      - name: Build web
        run: npm run build

      - name: Deploy web to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy

      - name: Verify current issue is live
        env:
          RUNEORRRI_SITE_BASE_URL: ${{ secrets.RUNEORRRI_SITE_BASE_URL }}
        run: npm run verify:live
