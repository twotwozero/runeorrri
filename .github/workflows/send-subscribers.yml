name: Send Subscribers

on:
  workflow_dispatch:
    inputs:
      confirm_subscriber_send:
        description: "Type true only after editorial approval to send to all active subscribers."
        required: true
        type: boolean
        default: false
      issue_id:
        description: "Issue id to send."
        required: true
        type: string
        default: latest

jobs:
  send:
    if: ${{ inputs.confirm_subscriber_send == true }}
    runs-on: ubuntu-latest
    env:
      ISSUE_ID: ${{ inputs.issue_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify issue is live
        env:
          RUNEORRRI_SITE_BASE_URL: ${{ secrets.RUNEORRRI_SITE_BASE_URL }}
        run: python scripts/verify_live_issue.py --issue-id "$ISSUE_ID"

      - name: Send newsletter to all subscribers
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_FROM_NAME: ${{ secrets.MAIL_FROM_NAME }}
          RUNEORRRI_SITE_BASE_URL: ${{ secrets.RUNEORRRI_SITE_BASE_URL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/send_issue_email.py --recipients subscribers --confirm-subscriber-send --issue-id "$ISSUE_ID"
