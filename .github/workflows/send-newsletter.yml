name: Send Newsletter

on:
  schedule:
    - cron: '0 0 * * 2'  # 화요일 09:00 KST (00:00 UTC)
    - cron: '0 0 * * 4'  # 목요일 09:00 KST
    - cron: '0 0 * * 6'  # 토요일 09:00 KST
  workflow_dispatch:      # 수동 트리거

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Send newsletter to all subscribers
        working-directory: scripts
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_FROM_NAME: runeorrri
          RUNEORRRI_SITE_BASE_URL: ${{ secrets.RUNEORRRI_SITE_BASE_URL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python send_issue_email.py
